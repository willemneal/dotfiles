name: template-check
on: [push, pull_request]
jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [darwin, linux]
        hostname: [mai, other]
    steps:
      - uses: actions/checkout@v4
      - run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Render every .tmpl
        run: |
          set -e
          printf 'name="T"\nemail="t@e"\n[chezmoi]\nos="${{ matrix.os }}"\nhostname="${{ matrix.hostname }}"\n' > /tmp/o.toml
          CM="$HOME/.local/bin/chezmoi"
          for f in $(git ls-files '*.tmpl' | grep -v '^\.chezmoi\.toml\.tmpl$'); do
            "$CM" execute-template --source="$PWD" --override-data-file=/tmp/o.toml < "$f" >/dev/null
          done
          "$CM" execute-template --init --source="$PWD" -p name=T -p email=t@e < .chezmoi.toml.tmpl >/dev/null
