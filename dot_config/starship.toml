"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$nodejs\
$cmd_duration\
$line_break\
$character"""

palette = "catppuccin_mocha"

# Bail on slow git_status calls (large repos, fsmonitor not configured).
command_timeout = 1000

[character]
success_symbol = "[❯](maroon)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
style = "blue bold"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "lavender"
format = "[$symbol$branch]($style) "

[git_status]
style = "red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified = "!"
staged = "+"
deleted = "✘"

[python]
symbol = " "
style = "yellow"
detect_files = ["pyproject.toml", ".python-version"]
detect_folders = [".venv", "venv"]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = " "
style = "peach"

[nodejs]
symbol = " "
style = "green"
detect_files = ["package.json", ".node-version"]

[cmd_duration]
min_time = 2_000
style = "subtext1"
format = "[took $duration]($style) "

# Catppuccin Mocha — matches the alacritty/zellij theme.
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
